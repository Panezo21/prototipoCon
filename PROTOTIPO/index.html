<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartStock Contable — Inventario & Contabilidad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/productos.css">
  <link rel="stylesheet" href="css/compras.css">
  <link rel="stylesheet" href="css/ventas.css">
  <link rel="stylesheet" href="css/kardex.css">
  <link rel="stylesheet" href="css/contabilidad.css">
  <link rel="stylesheet" href="css/reportes.css">
</head>
<body>
  <!-- Overlay móvil -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar lateral -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <i class="fas fa-cubes"></i>
        <div class="logo-text">
          <span class="logo-title">SmartStock</span>
          <span class="logo-subtitle">Contable</span>
        </div>
      </div>
      <button class="sidebar-close" id="sidebarClose" aria-label="Cerrar menú">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <nav class="sidebar-nav">
      <ul>
        <li><a href="#dashboard" class="nav-link active" data-module="dashboard"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a></li>
        <li><a href="#productos" class="nav-link" data-module="productos"><i class="fas fa-box"></i><span>Productos</span></a></li>
        <li><a href="#compras" class="nav-link" data-module="compras"><i class="fas fa-shopping-cart"></i><span>Compras</span></a></li>
        <li><a href="#ventas" class="nav-link" data-module="ventas"><i class="fas fa-cash-register"></i><span>Ventas</span></a></li>
        <li><a href="#movimientos" class="nav-link" data-module="movimientos"><i class="fas fa-exchange-alt"></i><span>Movimientos</span></a></li>
        <li><a href="#kardex" class="nav-link" data-module="kardex"><i class="fas fa-book"></i><span>Kardex</span></a></li>
        <li><a href="#contabilidad" class="nav-link" data-module="contabilidad"><i class="fas fa-calculator"></i><span>Contabilidad</span></a></li>
        <li><a href="#reportes" class="nav-link" data-module="reportes"><i class="fas fa-file-alt"></i><span>Reportes</span></a></li>
        <li><a href="#prediccion" class="nav-link" data-module="prediccion"><i class="fas fa-brain"></i><span>Predicción IA</span></a></li>
        <li><a href="#configuracion" class="nav-link" data-module="configuracion"><i class="fas fa-cog"></i><span>Configuración</span></a></li>
      </ul>
    </nav>
    <div class="sidebar-footer">
      <small>v1.0 · Prototipo Académico</small>
    </div>
  </aside>

  <!-- Contenedor principal -->
  <div class="main-wrapper" id="mainWrapper">
    <!-- Navbar superior -->
    <header class="navbar">
      <div class="navbar-left">
        <button class="btn-icon sidebar-toggle" id="sidebarToggle" aria-label="Menú">
          <i class="fas fa-bars"></i>
        </button>
        <div class="breadcrumb">
          <span id="pageTitle">Dashboard</span>
        </div>
      </div>
      <div class="navbar-right">
        <div class="search-global">
          <i class="fas fa-search"></i>
          <input type="text" id="globalSearch" placeholder="Buscar productos...">
        </div>
        <button class="btn-icon notification-btn" id="notificationBtn" title="Alertas">
          <i class="fas fa-bell"></i>
          <span class="badge" id="alertBadge">0</span>
        </button>
        <div class="user-profile">
          <div class="avatar"><i class="fas fa-user"></i></div>
          <span>Contador</span>
        </div>
      </div>
    </header>

    <!-- Contenido de módulos -->
    <main class="content" id="mainContent">

      <!-- MÓDULO: DASHBOARD -->
      <section class="module active" id="module-dashboard"></section>

      <!-- MÓDULO: PRODUCTOS -->
      <section class="module" id="module-productos"></section>

      <!-- MÓDULO: COMPRAS -->
      <section class="module" id="module-compras"></section>

      <!-- MÓDULO: VENTAS -->
      <section class="module" id="module-ventas"></section>

      <!-- MÓDULO: MOVIMIENTOS -->
      <section class="module" id="module-movimientos"></section>

      <!-- MÓDULO: KARDEX -->
      <section class="module" id="module-kardex"></section>

      <!-- MÓDULO: CONTABILIDAD -->
      <section class="module" id="module-contabilidad"></section>

      <!-- MÓDULO: REPORTES -->
      <section class="module" id="module-reportes"></section>

      <!-- MÓDULO: PREDICCIÓN -->
      <section class="module" id="module-prediccion"></section>

      <!-- MÓDULO: CONFIGURACIÓN -->
      <section class="module" id="module-configuracion"></section>

    </main>
  </div>

  <!-- Modal genérico -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Modal</h3>
        <button class="btn-icon modal-close" id="modalClose"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- Panel de alertas -->
  <div class="alert-panel" id="alertPanel">
    <div class="alert-panel-header">
      <h4><i class="fas fa-bell"></i> Alertas de Inventario</h4>
      <button class="btn-icon" id="alertPanelClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="alert-panel-body" id="alertPanelBody"></div>
  </div>

  <!-- Chatbot asistente contable -->
  <div class="chatbot-container" id="chatbotContainer">
    <button class="chatbot-toggle" id="chatbotToggle" title="Asistente Contable">
      <i class="fas fa-robot"></i>
    </button>
    <div class="chatbot-window" id="chatbotWindow">
      <div class="chatbot-header">
        <div><i class="fas fa-robot"></i> Asistente Contable IA</div>
        <button class="btn-icon" id="chatbotClose"><i class="fas fa-times"></i></button>
      </div>
      <div class="chatbot-messages" id="chatbotMessages"></div>
      <div class="chatbot-input">
        <input type="text" id="chatbotInput" placeholder="Pregunta sobre tu inventario...">
        <button id="chatbotSend"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Librerías externas -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <!-- Scripts de la aplicación -->
  <script src="js/storage.js"></script>
  <script src="js/movimientos.js"></script>
  <script src="js/kardex.js"></script>
  <script src="js/contabilidad.js"></script>
  <script src="js/factura-import.js"></script>
  <script src="js/productos.js"></script>
  <script src="js/compras.js"></script>
  <script src="js/ventas.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/reportes.js"></script>
  <script src="js/prediccion.js"></script>
  <script src="js/configuracion.js"></script>
  <script src="js/chatbot.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
